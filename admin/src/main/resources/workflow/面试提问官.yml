      nodeParam:
        uid: '19496768956'
        code: |
          import json
          import re

          def _s(v):
              return "" if v is None else str(v).strip()

          def _to_int(v, default=0):
              try:
                  return int(str(v).strip())
              except Exception:
                  return default

          def _finish():
              return {
                  "end_interview": True,
                  "question_id": "",
                  "is_follow_up": False,
                  "target_skill": "",
                  "difficulty": "",
                  "ask_to_user": ""
              }

          def _extract_text(raw_text):
              s = _s(raw_text)
              if not s:
                  return ""

              if s.startswith("```"):
                  s = re.sub(r"^```[a-zA-Z]*\n?", "", s)
                  s = re.sub(r"\n?```$", "", s).strip()

              # 兼容 JSON 输出
              try:
                  obj = json.loads(s)
                  if isinstance(obj, dict):
                      if isinstance(obj.get("json"), str):
                          try:
                              inner = json.loads(obj["json"])
                              if isinstance(inner, dict):
                                  obj = inner
                          except Exception:
                              pass
                      return _s(obj.get("ask_to_user") or obj.get("follow_up_question") or obj.get("question") or obj.get("output"))
                  if isinstance(obj, str):
                      return _s(obj)
              except Exception:
                  pass

              # 纯文本输出
              return s.replace("\r\n", "\n").split("\n")[0].strip()

          def main(raw_text, mode, follow_up_count, max_follow_up, question):
              m = _s(mode).upper()
              c = _to_int(follow_up_count, 0)
              mx = _to_int(max_follow_up, 2)

              # 流程控制
              if m != "FOLLOW_UP" or m == "FINISH":
                  return _finish()
              if c >= mx:
                  return _finish()
              if _s(question) == "":
                  return _finish()

              ask = _extract_text(raw_text)

              # 模型没有有效追问则结束
              if _s(ask) == "" or _s(ask).upper() == "__FINISH__":
                  return _finish()

              if len(ask) > 100:
                  ask = ask[:100].strip()
              if ask and not ask.endswith(("？", "?")):
                  ask += "？"

              return {
                  "end_interview": False,
                  "question_id": f"follow_up_{c}",
                  "is_follow_up": True,
                  "target_skill": "General",
                  "difficulty": "MEDIUM",
                  "ask_to_user": ask
              }
        appId: 12a0a7e2
        codeErrMsg: ''
